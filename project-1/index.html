<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Task List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      padding: 40px 48px;
      width: 100%;
      max-width: 440px;
    }
    .card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 10px;
      background: #f8f9fb;
      transition: background 0.15s;
      cursor: pointer;
    }
    .task-item:hover { background: #eef0f5; }
    .task-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-label {
      font-size: 0.95rem;
      color: #333;
      transition: color 0.2s;
      user-select: none;
    }
    .task-item.done .task-label {
      text-decoration: line-through;
      color: #aaa;
    }
    .counter {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 0.875rem;
      color: #888;
      text-align: center;
    }
    .counter span {
      font-weight: 600;
      color: #6c63ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>My Task List</h1>
    <ul class="task-list">
      <li class="task-item"><input type="checkbox" /><span class="task-label">Buy groceries</span></li>
      <li class="task-item"><input type="checkbox" /><span class="task-label">Call a friend</span></li>
      <li class="task-item"><input type="checkbox" /><span class="task-label">Read for 30 minutes</span></li>
      <li class="task-item"><input type="checkbox" /><span class="task-label">Go for a walk</span></li>
      <li class="task-item"><input type="checkbox" /><span class="task-label">Clean the desk</span></li>
    </ul>
    <p class="counter"><span id="count">0</span> of 5 tasks completed</p>
  </div>
  <script>
    const items = document.querySelectorAll('.task-item');
    const count = document.getElementById('count');
    function updateCount() {
      count.textContent = document.querySelectorAll('.task-item.done').length;
    }
    items.forEach(item => {
      const checkbox = item.querySelector('input[type="checkbox"]');
      item.addEventListener('click', e => {
        if (e.target !== checkbox) checkbox.checked = !checkbox.checked;
        item.classList.toggle('done', checkbox.checked);
        updateCount();
      });
    });
  </script>
</body>
</html>
