<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чек-лист перевірки офферу і копірайтингу</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #f5f4f2;
    color: #2e2e2e;
    padding: 2rem 1rem 4rem;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header h1 { font-size: 1.75rem; font-weight: 700; color: #2e2e2e; line-height: 1.3; margin-bottom: .5rem; }
  .header p { font-size: .95rem; color: #888; font-style: italic; }
  .progress-wrap { margin-bottom: 2rem; }
  .progress-meta { display: flex; justify-content: space-between; font-size: .8rem; color: #888; margin-bottom: .4rem; }
  .progress-meta span:last-child { font-weight: 600; color: #f26a1f; }
  .bar-bg { background: #e8e6e1; border-radius: 99px; height: 7px; overflow: hidden; }
  .bar-fill { height: 7px; border-radius: 99px; background: #f26a1f; transition: width .35s ease; width: 0%; }
  .section { background: #fff; border-radius: 14px; margin-bottom: 1rem; overflow: hidden; border: 1px solid #ece9e3; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.1rem; border-left: 4px solid #f26a1f; background: #fff8f4; cursor: pointer; user-select: none; }
  .section-header:hover { background: #fff3ec; }
  .section-title { font-size: 1rem; font-weight: 600; color: #c45510; }
  .section-badge { font-size: .75rem; color: #f26a1f; background: #fff0e6; border: 1px solid #fad0b0; border-radius: 99px; padding: 2px 10px; font-weight: 500; white-space: nowrap; }
  .items { padding: .4rem .8rem .6rem; }
  .item { display: flex; align-items: flex-start; gap: 10px; padding: .55rem .3rem; border-bottom: 1px solid #f2efe9; cursor: pointer; }
  .item:last-child { border-bottom: none; }
  .item:hover .cb { border-color: #f26a1f; }
  .cb { width: 20px; height: 20px; min-width: 20px; border-radius: 5px; border: 1.5px solid #d0ccc4; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; flex-shrink: 0; }
  .cb.checked { background: #f26a1f; border-color: #f26a1f; }
  .cb.checked::after { content: ''; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
  .item-text { font-size: .9rem; line-height: 1.55; color: #2e2e2e; transition: color .15s; }
  .item-text.done { color: #b0ab9f; text-decoration: line-through; }
  .footer-note { margin-top: 1.75rem; padding: 1rem 1.25rem; background: #fff; border-radius: 12px; border: 1px solid #ece9e3; border-left: 4px solid #f26a1f; font-size: .875rem; color: #666; line-height: 1.6; font-style: italic; }
  .all-done-banner { display: none; text-align: center; margin-top: 1.5rem; padding: 1.25rem; background: #fff8f4; border: 1px solid #fad0b0; border-radius: 14px; }
  .all-done-banner .icon { font-size: 2rem; }
  .all-done-banner p { margin-top: .4rem; font-size: 1rem; font-weight: 600; color: #c45510; }
  .reset-btn { margin-top: .75rem; font-size: .8rem; color: #999; background: none; border: 1px solid #ddd; border-radius: 8px; padding: 5px 14px; cursor: pointer; }
  .reset-btn:hover { color: #555; border-color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Чек-лист перевірки офферу і копірайтингу</h1>
    <p>Лендинг готовий тоді, коли всі галочки стоять</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">Виконано: 0 / 22</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
  </div>
  <div id="sections"></div>
  <div class="footer-note">Кожен пункт, який не вдалося відмітити — це ваше завдання перед запуском.</div>
  <div class="all-done-banner" id="all-done">
    <div class="icon">✅</div>
    <p>Лендинг готовий до запуску!</p>
    <button class="reset-btn" onclick="resetAll()">Скинути</button>
  </div>
</div>
<script>
const data = [
  { title: "Оффер", items: [
    "Є одна головна обіцянка — конкретний результат, а не опис процесу навчання",
    "З офферу одразу зрозуміло: що за продукт, для кого і завдяки чому я отримаю результат",
    "Оффер вирішує реальний біль з аналізу ЦА",
    "Оффер про клієнта і його вигоду, а не про мене і мої регалії"
  ]},
  { title: "Перший екран", items: [
    "Заголовок зрозумілий за 8 секунд і відповідає на питання «куди я потрапив»",
    "У заголовку вигода для людини, а не опис курсу",
    "Є підзаголовок, який підсилює і уточнює головну обіцянку",
    "Буліти конкретні: знімають заперечення або підсилюють вигоди",
    "Весь перший екран поміщається на екран мобільного без прогортування"
  ]},
  { title: "Блоки лендингу", items: [
    "Є всі обов'язкові блоки: для кого, про автора, програма, як проходить навчання, результати, відгуки, гарантія, питання-відповіді",
    "Кожен блок займає максимум 1–2 екрани мобільного — немає перевантажених сторінок",
    "Блок «для кого» описує конкретні ситуації, а не ярлики — людина впізнає себе",
    "Блок результатів малює чітку точку Б: людина може уявити себе після курсу і захотіти цього стану",
    "Результати описані дієсловами дії: опануєте, зрозумієте, зможете, отримаєте",
    "У блоці питання-відповіді закриті всі заперечення, які можуть виникнути перед оплатою"
  ]},
  { title: "Копірайтинг", items: [
    "Текст написано мовою аудиторії, словами з аналізу ЦА",
    "Скрізь продаються вигоди, а не характеристики",
    "Абзаци короткі, по 2–3 речення",
    "Текст легко сканувати очима: є підзаголовки і структура",
    "Прибрано воду, експертну мову і канцеляризм",
    "Є тригер: обмеження, дата старту або знижка з дедлайном"
  ]},
  { title: "Докази", items: [
    "Є відгуки з іменем, нікнеймом — не анонімні",
    "Є цифри: кількість учнів, проєктів, років досвіду"
  ]},
  { title: "Фінальна перевірка", items: [
    "Текст прочитано вголос — ніде не спіткнувся",
    "Хтось зі сторони прочитав і зрозумів суть за хвилину",
    "Пройшовши сторінку зверху вниз, людина логічно приходить до рішення купити"
  ]}
];
const total = data.reduce((s, sec) => s + sec.items.length, 0);
const state = {};
function update() {
  const done = Object.values(state).filter(Boolean).length;
  document.getElementById('prog-label').textContent = `Виконано: ${done} / ${total}`;
  const pct = Math.round(done / total * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('bar').style.width = pct + '%';
  data.forEach((sec, si) => {
    const cnt = sec.items.filter((_, ii) => state[`${si}-${ii}`]).length;
    const badge = document.getElementById(`badge-${si}`);
    badge.textContent = `${cnt} / ${sec.items.length}`;
    if (cnt === sec.items.length) badge.classList.add('done');
    else badge.classList.remove('done');
  });
  document.getElementById('all-done').style.display = done === total ? 'block' : 'none';
}
function resetAll() {
  Object.keys(state).forEach(k => state[k] = false);
  document.querySelectorAll('.cb').forEach(el => el.classList.remove('checked'));
  document.querySelectorAll('.item-text').forEach(el => el.classList.remove('done'));
  update();
}
const container = document.getElementById('sections');
data.forEach((sec, si) => {
  const wrap = document.createElement('div');
  wrap.className = 'section';
  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = `<span class="section-title">${sec.title}</span><span class="section-badge" id="badge-${si}">0 / ${sec.items.length}</span>`;
  wrap.appendChild(hdr);
  const items = document.createElement('div');
  items.className = 'items';
  sec.items.forEach((text, ii) => {
    const key = `${si}-${ii}`;
    state[key] = false;
    const row = document.createElement('div');
    row.className = 'item';
    const cb = document.createElement('div');
    cb.className = 'cb';
    cb.setAttribute('role', 'checkbox');
    cb.setAttribute('aria-checked', 'false');
    cb.setAttribute('tabindex', '0');
    const label = document.createElement('div');
    label.className = 'item-text';
    label.textContent = text;
    function toggle() {
      state[key] = !state[key];
      cb.classList.toggle('checked', state[key]);
      label.classList.toggle('done', state[key]);
      cb.setAttribute('aria-checked', String(state[key]));
      update();
    }
    row.addEventListener('click', toggle);
    cb.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); } });
    row.appendChild(cb);
    row.appendChild(label);
    items.appendChild(row);
  });
  wrap.appendChild(items);
  container.appendChild(wrap);
});
update();
</script>
</body>
</html>
